##########################################################################
# 🪖 PODCAST GUERRILLA G-SQUAD (T1 特戰物流：Opus 壓縮 + R2 倉儲版)
##########################################################################
# 1. 指揮權限：由 GitHub Actions 內部 Schedule 觸發。
# 2. 出勤週期：台北時間 每日 凌晨 03:00 (UTC 19:00)。(由 Python 決定實戰或溫養)
# 3. 核心特徵：獨立 Proxy 出口、Opus 極限壓縮、上傳 R2 交接 T2。
##########################################################################

name: Podcast Guerrilla Squad Sync

on:
  schedule:
    # 🚀 台北 03:00 (每日) = UTC 19:00 (每日)
    # 💡 讓 Python 內部的 weekday 邏輯去決定今天要實戰還是溫養
    - cron: '0 19 * * *'
  
  # 🛠️ 支援手動從 Actions 介面點擊觸發
  workflow_dispatch:

jobs:
  guerrilla_hit:
    runs-on: ubuntu-latest
    timeout-minutes: 150 # 考慮到 20 分鐘的任務間休息與擬態閱讀，給予充足時長

    env:
      PYTHONUNBUFFERED: 1
      # 🔐 [游擊隊專屬] 代理密鑰
      WEBSHARE_LIST: ${{ secrets.WEBSHARE_LIST }}
      
      # 🛡️ [防禦性配置] 補回 AI 密鑰，防止 AIAgent 啟動檢查時報錯
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      # 🚀 [新增] R2 兵工廠密鑰 (交接給 T2 必備)
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }} 
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}     
      
      # 🔐 [基礎設施] 共享資料庫與 Webhook
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      RENDER_WEBHOOK_URL: ${{ secrets.RENDER_WEBHOOK_URL }}
      GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: 📦 [部署] 檢出程式碼
        uses: actions/checkout@v4

      - name: 🐍 [環境] 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: ⚙️ [裝備] 安裝系統依賴 (FFmpeg/Opus) 與 Python 庫
        run: |
          # 🚀 關鍵：安裝 libopus-dev 以支援 16k Mono Opus 轉碼
          sudo apt-get update && sudo apt-get install -y ffmpeg libopus-dev
          python -m pip install --upgrade pip
          # 🚀 [修正] 補回裝飾用 AI 套件 (google-generativeai, groq) 滿足父類別依賴
          pip install "curl_cffi>=0.7.0" "requests[socks]" feedparser PySocks python-dotenv supabase google-cloud-storage boto3 google-generativeai groq
      
      - name: ⚔️ [突擊] 啟動 g-小隊領命任務
        run: |
          echo "📅 系統啟動時間 (UTC): $(date -u)"
          python src/podcast_g_proc.py

      - name: 🧹 [清理] 任務結案並移除殘留音檔
        if: always()
        run: |
          rm -f *.mp3 *.opus
          echo "🏁 游擊現場清理完畢，戰利品已移交 R2 雲端。"