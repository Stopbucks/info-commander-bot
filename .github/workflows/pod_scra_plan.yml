##########################################################################
# 🏃 S-Plan 5.0 全鏈條接力 - 混編艦隊全能偵察版 (2026 旗艦版)
##########################################################################
name: 🏃 S-Plan Universal Fleet

on:
  schedule:
    # 🚀 每 4 小時巡邏一次，避開整點與 18 分 (對應 UTC 00:35, 04:35, 08:35...)
    - cron: '35 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      force_mode:
        description: '🚀 選擇作戰模式 (Officer 使用)'
        required: true
        default: 'AUTO'
        type: choice
        options: 
          - AUTO
          - MODE_1_Scrapi
          - MODE_2_Zenrows
          - MODE_3_Hasdata
          - MODE_4_Scrapedo

jobs:
  fleet_operations:
    runs-on: ubuntu-latest
    timeout-minutes: 180 

    env:
      # --- 核心連線 ---
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        
      # --- AI 引擎 ---
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # --- 通訊與動員 ---
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
      # --- 偵察金鑰 ---
      SCRAP_API_KEY: ${{ secrets.SCRAP_API_KEY }}
      ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
      WEBSCRAP_API_KEY: ${{ secrets.WEBSCRAP_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
      HASDATA_API_KEY: ${{ secrets.HASDATA_API_KEY }}
      SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
      SCRAP_API_KEY_V2: ${{ secrets.SCRAP_API_KEY_V2 }}
      
      WORKER_ID: GITHUB
      PYTHONUNBUFFERED: 1
    
    steps:
    - name: 📦 檢出程式碼
      uses: actions/checkout@v4

    - name: 🐍 設定 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: ⚙️ 安裝必要依賴與 FFmpeg
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        python -m pip install --upgrade pip
        # 🚀 升級：加入 lxml 以提升解析穩定度
        pip install requests beautifulsoup4 lxml supabase python-dotenv boto3 google-generativeai groq feedparser

    - name: 🏢 [Step 1] 戰區報到與決策 (HQ)
      # 🚀 HQ v2.0 會產出 SHOULD_DOWNLOAD 與 SHOULD_TRANSPORT 兩個信號
      run: python src/pod_scra_hq.py

    - name: 🎯 [Step 2] 執行偵察 (Officer)
      env:
        STRATEGY_MODE: ${{ github.event.inputs.force_mode || 'AUTO' }}
      run: |
        echo "📡 [啟動] 偵察官出擊..."
        python src/pod_scra_officer.py

    - name: 🚛 [Step 3] 執行搬運 (Logistics - 條件觸發)
      # 🚀 只有輪值到 GITHUB 且計數達標時才點火
      if: env.SHOULD_DOWNLOAD == 'true'
      run: |
        echo "🚛 [啟動] 要塞核心運輸模組..."
        python src/pod_scra_logistics.py

    - name: 📝 [Step 4] 情報提煉 (Transport - 條件觸發)
      # 🚀 只有 GHA_TRANSPORT_COUNTER 達標時才消耗 Gemini 配額
      if: env.SHOULD_TRANSPORT == 'true'
      run: |
        echo "📝 [啟動] 情報生產與 Telegram 報戰..."
        python src/pod_scra_transport.py

    - name: 🧹 [Step 5] 倉庫大掃除 (Cleaner)
      run: |
        echo "🧹 [啟動] 戰場後勤清理..."
        python src/pod_scra_cleaner.py