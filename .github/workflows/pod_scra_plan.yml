##########################################################################
# 🏃 S-Plan 4.1 全鏈條接力 - 中央指揮與異地動員版
##########################################################################
name: 🏃 S-Plan podcast

on:
  schedule:
    - cron: '0 19 * * 1-5' # 週一至週五 03:00 (台北時間)
    - cron: '0 19 1 * *'    # 每月 1 日凌晨 03:00 喚醒
  workflow_dispatch:
    inputs:
      force_mode:
        description: '🚀 選擇作戰模式'
        required: true
        default: 'AUTO'
        type: choice
        options: 
          - AUTO
          - MODE_1_Scrapi
          - MODE_2_Zenrows
          - MODE_3_Hasdata
          - MODE_4_Scrapedo

jobs:
  relay_mission:
    runs-on: ubuntu-latest
    timeout-minutes: 180 

    env:
      # --- 核心連線 ---
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }} # 🚀 新增github密碼變數
        
      # --- AI 引擎 ---
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      # --- 通訊與動員 ---
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RENDER_WEBHOOK_URL: ${{ secrets.RENDER_WEBHOOK_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      
      # --- 偵察金鑰 ---
      SCRAP_API_KEY: ${{ secrets.SCRAP_API_KEY }}
      ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
      WEBSCRAP_API_KEY: ${{ secrets.WEBSCRAP_API_KEY }}
      SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
      HASDATA_API_KEY: ${{ secrets.HASDATA_API_KEY }}
      SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
      SCRAP_API_KEY_V2: ${{ secrets.SCRAP_API_KEY_V2 }}
      
      PYTHONUNBUFFERED: 1

    steps:
    - name: 📦 檢出程式碼
      uses: actions/checkout@v4

    - name: 🐍 設定 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: ⚙️ 安裝必要依賴與 FFmpeg
      run: |
        sudo apt-get update && sudo apt-get install -y ffmpeg
        python -m pip install --upgrade pip
        # 🚀 這裡必須補上 flask 與 apscheduler
        pip install requests beautifulsoup4 supabase python-dotenv boto3 google-generativeai groq feedparser flask apscheduler

    - name: 🎯 [Step 1] 執行偵察 (Officer)
      env:
        STRATEGY_MODE: ${{ github.event.inputs.force_mode || 'AUTO' }}
      run: |
        echo "📡 [啟動] 偵察官出擊..."
        python src/pod_scra_officer.py

    - name: 🚛 [Step 2] 執行搬運 (Fortress Core)
      run: |
        echo "🚛 [啟動] 要塞核心運輸模組 (GHA Node)..."
        # 🚀 關鍵：呼叫 app.py 裡的集成任務
        python -c "from app import run_integrated_mission; run_integrated_mission()"

    - name: 📡 [Step 3] 遠程動員 (喚醒 Render 執勤官)
      if: always()
      run: |
        echo "🔗 正在向遠程節點發送動員指令..."
        # 🚀 這裡維持喚醒 Render，確保免費層不會休眠
        curl -X POST "${{ secrets.RENDER_WEBHOOK_URL }}/ping" \
             -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
             --fail || echo "⚠️ 遠程節點無回應，由 GHA 本地處理"

    - name: 📝 [Step 4] 情報提煉 (Transport)
      # 🚀 說明：負責把 R2 檔案變戰報，發到 Telegram
      run: python src/pod_scra_transport.py

    - name: 🧹 [Step 5] 倉庫大掃除 (Cleaner)
      run: python src/pod_scra_cleaner.py